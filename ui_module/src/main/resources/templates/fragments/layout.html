<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${pageTitle} + ' — Laba J320'">Laba J320</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	      rel="stylesheet"
	      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"

</head>
<body>

		<a class="navbar-brand" th:href="@{/clients}">Laba J320</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse"

		        aria-expanded="false" aria-label="Меню">

		</button>
		<div class="collapse navbar-collapse" id="navbarNav">
			<ul class="navbar-nav">
				<li class="nav-item">
					<a class="nav-link" th:href="@{/clients}">Клиенты</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/clients/create}">Создать клиента</a>
				</li>
			</ul>
		</div>
	</div>
</nav>

<th:block th:fragment="scripts">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
	        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
	        crossorigin="anonymous"></script>
</th:block>

</html>
